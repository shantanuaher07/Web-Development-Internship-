<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form :</h1>

    <form action="" method="">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your Name " required><br><br>

        <label for="address">Address:</label>
        <input type="text" id="address" placeholder="Enter your Address"><br><br>

        <label for="contact">Contact:</label>
        <input type="number" id="contact" placeholder="Enter your Contact No." maxlength="10" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your Email" required><br><br>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your Password" required><br><br>

        <label for="year">Year :</label><br>
        <label for="first year">First Year</label>
        <input type="radio" id="first year" name="year"><br>

        <label for="second year">Second Year</label>
        <input type="radio" id="second year" name="year"><br>

        <label for="third year">Third Year</label>
        <input type="radio" id="third year" name="year"><br><br>

        <label for="branch">Branch :</label><br>
        <label for="IT">IT</label>
        <input type="radio" id="IT" name="branch"><br>

        <label for="AIML">AIML</label>
        <input type="radio" id="AIML" name="branch"><br>

        <label for="AIDS">AIDS</label>
        <input type="radio" id="AIDS" name="branch"><br>

        <label for="ETX">ETX</label>
        <input type="radio" id="ETX" name="branch"><br>

        <label for="EE">EE</label>
        <input type="radio" id="EE" name="branch"><br><br>

        <label for="skills">Skills:</label><br>
        <label for="HTML">HTML</label>
        <input type="checkbox" id="HTML" name="skills"><br>

        <label for="CSS">CSS</label>
        <input type="checkbox" id="CSS" name="skills"><br>

        <label for="JS">JS</label>
        <input type="checkbox" id="JS" name="skills"><br>

        <label for="C">C</label>
        <input type="checkbox" id="C" name="skills"><br>

        <label for="C++">C++</label>
        <input type="checkbox" id="C++" name="skills"><br>

        <label for="C#">C#</label>
        <input type="checkbox" id="C#" name="skills"><br><br>

        <input type="submit" value="submit">
    </form>
</body>
</html>
